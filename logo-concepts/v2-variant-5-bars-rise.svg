<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Variant 5: Rising Bars — Abstract financial growth chart -->
  <g fill="currentColor">
    <!-- Bar chart: ascending with rounded tops -->
    <rect x="15" y="68" width="10" height="20" rx="2"/>
    <rect x="28" y="56" width="10" height="32" rx="2"/>
    <rect x="41" y="44" width="10" height="44" rx="2"/>
    <rect x="54" y="34" width="10" height="54" rx="2"/>
    <rect x="67" y="22" width="10" height="66" rx="2"/>
    <!-- Trend line connecting tops -->
    <path d="M 20 66 L 33 54 L 46 42 L 59 32 L 72 20"
      fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Accent dot at peak -->
  <circle cx="72" cy="20" r="4" fill="currentColor"/>
</svg>
