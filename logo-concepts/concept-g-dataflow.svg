<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Concept G: 数据流汇聚 — 智能数据管理 -->
  <defs>
    <linearGradient id="grad-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#E8701A"/>
    </linearGradient>
  </defs>
  <!-- 数据流线条 — 从四周汇聚到中心 -->
  <path d="M30,50 Q65,50 100,100" fill="none" stroke="#E8701A" stroke-width="2" opacity="0.25"/>
  <path d="M30,80 Q65,80 100,100" fill="none" stroke="#E8701A" stroke-width="2" opacity="0.35"/>
  <path d="M30,120 Q65,120 100,100" fill="none" stroke="#E8701A" stroke-width="2" opacity="0.25"/>
  <path d="M30,150 Q65,150 100,100" fill="none" stroke="#E8701A" stroke-width="2" opacity="0.15"/>
  <path d="M170,50 Q135,50 100,100" fill="none" stroke="#E8701A" stroke-width="2" opacity="0.25"/>
  <path d="M170,80 Q135,80 100,100" fill="none" stroke="#E8701A" stroke-width="2" opacity="0.35"/>
  <path d="M170,120 Q135,120 100,100" fill="none" stroke="#E8701A" stroke-width="2" opacity="0.25"/>
  <path d="M170,150 Q135,150 100,100" fill="none" stroke="#E8701A" stroke-width="2" opacity="0.15"/>
  <!-- 小数据点 -->
  <circle cx="30" cy="50" r="4" fill="#E8701A" opacity="0.5"/>
  <circle cx="30" cy="80" r="4" fill="#E8701A" opacity="0.6"/>
  <circle cx="30" cy="120" r="4" fill="#E8701A" opacity="0.5"/>
  <circle cx="30" cy="150" r="4" fill="#E8701A" opacity="0.4"/>
  <circle cx="170" cy="50" r="4" fill="#E8701A" opacity="0.5"/>
  <circle cx="170" cy="80" r="4" fill="#E8701A" opacity="0.6"/>
  <circle cx="170" cy="120" r="4" fill="#E8701A" opacity="0.5"/>
  <circle cx="170" cy="150" r="4" fill="#E8701A" opacity="0.4"/>
  <!-- 中心核心 -->
  <circle cx="100" cy="100" r="32" fill="#1E293B" stroke="url(#grad-g)" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="22" fill="url(#grad-g)" opacity="0.15"/>
  <!-- ¥ 核心 -->
  <text x="100" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="url(#grad-e)">¥</text>
</svg>
