<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>三角形几何变体</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #0c0e14; color: #a1a7b5; padding: 40px; display: flex; flex-direction: column; align-items: center; }
  h1 { font-size: 18px; color: #f0f2f5; margin-bottom: 32px; font-weight: 600; }
  .row { display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
  .item { text-align: center; width: 160px; }
  .item .label { font-size: 12px; color: #6b7280; margin-bottom: 12px; }
  .item .sub { font-size: 10px; color: #4b5163; margin-bottom: 8px; }
  .preview { width: 100px; height: 100px; background: #1a1d27; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; }
  .preview svg { color: #E8701A; }
  .sizes { display: flex; gap: 6px; align-items: flex-end; justify-content: center; margin-top: 6px; }
  .sizes .s { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .sizes .s span { font-size: 8px; color: #4b5163; }
  .titlebar { display: flex; align-items: center; gap: 6px; height: 30px; padding: 0 10px; background: #1e2130; border-radius: 6px; margin-top: 8px; }
  .titlebar svg { color: #E8701A; }
  .titlebar span { font-size: 11px; color: #6b7280; }
</style>
</head>
<body>
<h1>三角形几何变体 · 连接方式 + 倒圆</h1>
<div class="row">

  <!-- 1: 当前原版 -->
  <div class="item">
    <div class="label">当前原版</div>
    <div class="sub">尖角交汇 + 尖角底</div>
    <div class="preview">
      <svg width="52" height="52" viewBox="0 0 20 20" fill="none">
        <path d="M3.5 15 L10 3.5 L16.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="4" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="sizes">
      <div class="s"><svg width="36" height="36" viewBox="0 0 20 20" fill="none"><path d="M3.5 15 L10 3.5 L16.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="4" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span>36</span></div>
      <div class="s"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3.5 15 L10 3.5 L16.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="4" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span>20</span></div>
    </div>
    <div class="titlebar">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3.5 15 L10 3.5 L16.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="4" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>工程管家</span>
    </div>
  </div>

  <!-- 2: 顶点断开 -->
  <div class="item">
    <div class="label">顶点断开</div>
    <div class="sub">顶点留缺口，未完全闭合</div>
    <div class="preview">
      <svg width="52" height="52" viewBox="0 0 20 20" fill="none">
        <line x1="3.5" y1="15" x2="9.2" y2="4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="10.8" y1="4.5" x2="16.5" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="4" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="sizes">
      <div class="s"><svg width="36" height="36" viewBox="0 0 20 20" fill="none"><line x1="3.5" y1="15" x2="9.2" y2="4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="10.8" y1="4.5" x2="16.5" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span>36</span></div>
      <div class="s"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><line x1="3.5" y1="15" x2="9.2" y2="4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="10.8" y1="4.5" x2="16.5" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span>20</span></div>
    </div>
    <div class="titlebar">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><line x1="3.5" y1="15" x2="9.2" y2="4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="10.8" y1="4.5" x2="16.5" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>工程管家</span>
    </div>
  </div>

  <!-- 3: 顶点圆角 -->
  <div class="item">
    <div class="label">顶点圆角</div>
    <div class="sub">顶部用弧线过渡，底部保持尖角</div>
    <div class="preview">
      <svg width="52" height="52" viewBox="0 0 20 20" fill="none">
        <path d="M3.5 15 L7 7 Q10 2.5 13 7 L16.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="4" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="sizes">
      <div class="s"><svg width="36" height="36" viewBox="0 0 20 20" fill="none"><path d="M3.5 15 L7 7 Q10 2.5 13 7 L16.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="4" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span>36</span></div>
      <div class="s"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3.5 15 L7 7 Q10 2.5 13 7 L16.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="4" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span>20</span></div>
    </div>
    <div class="titlebar">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3.5 15 L7 7 Q10 2.5 13 7 L16.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="4" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>工程管家</span>
    </div>
  </div>

  <!-- 4: 全圆角 -->
  <div class="item">
    <div class="label">全圆角</div>
    <div class="sub">三个角全部倒圆</div>
    <div class="preview">
      <svg width="52" height="52" viewBox="0 0 20 20" fill="none">
        <path d="M6 15 Q3.5 15 4.5 13 L8.5 5 Q10 3 11.5 5 L15.5 13 Q16.5 15 14 15 Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div class="sizes">
      <div class="s"><svg width="36" height="36" viewBox="0 0 20 20" fill="none"><path d="M6 15 Q3.5 15 4.5 13 L8.5 5 Q10 3 11.5 5 L15.5 13 Q16.5 15 14 15 Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span>36</span></div>
      <div class="s"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M6 15 Q3.5 15 4.5 13 L8.5 5 Q10 3 11.5 5 L15.5 13 Q16.5 15 14 15 Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span>20</span></div>
    </div>
    <div class="titlebar">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M6 15 Q3.5 15 4.5 13 L8.5 5 Q10 3 11.5 5 L15.5 13 Q16.5 15 14 15 Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>工程管家</span>
    </div>
  </div>

  <!-- 5: 底边断开 -->
  <div class="item">
    <div class="label">底边断开</div>
    <div class="sub">底边中间留缺口</div>
    <div class="preview">
      <svg width="52" height="52" viewBox="0 0 20 20" fill="none">
        <path d="M3.5 15 L10 3.5 L16.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="4" y1="16" x2="8.5" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="11.5" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="sizes">
      <div class="s"><svg width="36" height="36" viewBox="0 0 20 20" fill="none"><path d="M3.5 15 L10 3.5 L16.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="4" y1="16" x2="8.5" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="11.5" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span>36</span></div>
      <div class="s"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3.5 15 L10 3.5 L16.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="4" y1="16" x2="8.5" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="11.5" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span>20</span></div>
    </div>
    <div class="titlebar">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3.5 15 L10 3.5 L16.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="4" y1="16" x2="8.5" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="11.5" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>工程管家</span>
    </div>
  </div>

  <!-- 6: 顶圆底方 -->
  <div class="item">
    <div class="label">顶圆底方</div>
    <div class="sub">顶点圆角 + 底边方角，对比感</div>
    <div class="preview">
      <svg width="52" height="52" viewBox="0 0 20 20" fill="none">
        <path d="M3.5 15 L7 7 Q10 2.5 13 7 L16.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"/>
        <line x1="3.5" y1="15.5" x2="7.5" y2="15.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="square"/>
        <line x1="12.5" y1="15.5" x2="16.5" y2="15.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="square"/>
      </svg>
    </div>
    <div class="sizes">
      <div class="s"><svg width="36" height="36" viewBox="0 0 20 20" fill="none"><path d="M3.5 15 L7 7 Q10 2.5 13 7 L16.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"/><line x1="3.5" y1="15.5" x2="7.5" y2="15.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="square"/><line x1="12.5" y1="15.5" x2="16.5" y2="15.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="square"/></svg><span>36</span></div>
      <div class="s"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3.5 15 L7 7 Q10 2.5 13 7 L16.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"/></svg><span>20</span></div>
    </div>
    <div class="titlebar">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3.5 15 L7 7 Q10 2.5 13 7 L16.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"/><line x1="3.5" y1="15.5" x2="7.5" y2="15.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="square"/><line x1="12.5" y1="15.5" x2="16.5" y2="15.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="square"/></svg>
      <span>工程管家</span>
    </div>
  </div>

</div>
</body>
</html>
