<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>五角星几何变体</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #0c0e14; color: #a1a7b5; padding: 40px; display: flex; flex-direction: column; align-items: center; }
  h1 { font-size: 18px; color: #f0f2f5; margin-bottom: 32px; font-weight: 600; }
  .row { display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; max-width: 960px; }
  .item { text-align: center; width: 160px; }
  .item .label { font-size: 12px; color: #6b7280; margin-bottom: 12px; }
  .item .sub { font-size: 10px; color: #4b5163; margin-bottom: 8px; }
  .preview { width: 100px; height: 100px; background: #1a1d27; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; }
  .preview svg { color: #E8701A; }
  .sizes { display: flex; gap: 6px; align-items: flex-end; justify-content: center; margin-top: 6px; }
  .sizes .s { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .sizes .s span { font-size: 8px; color: #4b5163; }
  .titlebar { display: flex; align-items: center; gap: 6px; height: 30px; padding: 0 10px; background: #1e2130; border-radius: 6px; margin-top: 8px; }
  .titlebar svg { color: #E8701A; }
  .titlebar span { font-size: 11px; color: #6b7280; }
</style>
</head>
<body>
<h1>五角星几何变体</h1>
<div class="row">

  <!-- 1: 标准五角星 -->
  <div class="item">
    <div class="label">标准五角星</div>
    <div class="sub">经典五角星轮廓</div>
    <div class="preview">
      <svg width="52" height="52" viewBox="0 0 100 100" fill="none">
        <polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="3.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="sizes">
      <div class="s"><svg width="36" height="36" viewBox="0 0 100 100" fill="none"><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="3.5" stroke-linejoin="round"/></svg><span>36</span></div>
      <div class="s"><svg width="20" height="20" viewBox="0 0 100 100" fill="none"><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="3.5" stroke-linejoin="round"/></svg><span>20</span></div>
    </div>
    <div class="titlebar">
      <svg width="18" height="18" viewBox="0 0 100 100" fill="none"><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="3.5" stroke-linejoin="round"/></svg>
      <span>工程管家</span>
    </div>
  </div>

  <!-- 2: 五角星顶点断开 -->
  <div class="item">
    <div class="label">顶点断开</div>
    <div class="sub">五个顶点留缺口</div>
    <div class="preview">
      <svg width="52" height="52" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round">
        <line x1="39.5" y1="40" x2="50" y2="16"/>
        <line x1="50" y1="16" x2="60.5" y2="40"/>
        <line x1="61" y1="40" x2="88" y2="40"/>
        <line x1="88" y1="40" x2="70" y2="56"/>
        <line x1="67" y1="58" x2="75" y2="85"/>
        <line x1="75" y1="85" x2="52" y2="68"/>
        <line x1="50" y1="70" x2="25" y2="88"/>
        <line x1="25" y1="88" x2="35" y2="59"/>
        <line x1="33" y1="58" x2="12" y2="40"/>
        <line x1="12" y1="40" x2="39.5" y2="40"/>
      </svg>
    </div>
    <div class="sizes">
      <div class="s"><svg width="36" height="36" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"><line x1="39.5" y1="40" x2="50" y2="16"/><line x1="50" y1="16" x2="60.5" y2="40"/><line x1="61" y1="40" x2="88" y2="40"/><line x1="88" y1="40" x2="70" y2="56"/><line x1="67" y1="58" x2="75" y2="85"/><line x1="75" y1="85" x2="52" y2="68"/><line x1="50" y1="70" x2="25" y2="88"/><line x1="25" y1="88" x2="35" y2="59"/><line x1="33" y1="58" x2="12" y2="40"/><line x1="12" y1="40" x2="39.5" y2="40"/></svg><span>36</span></div>
      <div class="s"><svg width="20" height="20" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke-dasharray="22 8"/></svg><span>20</span></div>
    </div>
    <div class="titlebar">
      <svg width="18" height="18" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"><line x1="39.5" y1="40" x2="50" y2="16"/><line x1="50" y1="16" x2="60.5" y2="40"/><line x1="61" y1="40" x2="88" y2="40"/><line x1="88" y1="40" x2="70" y2="56"/><line x1="67" y1="58" x2="75" y2="85"/><line x1="75" y1="85" x2="52" y2="68"/><line x1="50" y1="70" x2="25" y2="88"/><line x1="25" y1="88" x2="35" y2="59"/><line x1="33" y1="58" x2="12" y2="40"/><line x1="12" y1="40" x2="39.5" y2="40"/></svg>
      <span>工程管家</span>
    </div>
  </div>

  <!-- 3: 圆角五角星 -->
  <div class="item">
    <div class="label">圆角五角星</div>
    <div class="sub">所有角倒圆，柔和</div>
    <div class="preview">
      <svg width="52" height="52" viewBox="0 0 100 100" fill="none">
        <path d="M50 15 Q53 28 61 38 L88 40 Q76 48 70 56 Q76 72 77 85 Q64 78 50 70 Q36 78 23 85 Q24 72 30 56 Q24 48 12 40 L39 38 Q47 28 50 15 Z" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="sizes">
      <div class="s"><svg width="36" height="36" viewBox="0 0 100 100" fill="none"><path d="M50 15 Q53 28 61 38 L88 40 Q76 48 70 56 Q76 72 77 85 Q64 78 50 70 Q36 78 23 85 Q24 72 30 56 Q24 48 12 40 L39 38 Q47 28 50 15 Z" stroke="currentColor" stroke-width="3"/></svg><span>36</span></div>
      <div class="s"><svg width="20" height="20" viewBox="0 0 100 100" fill="none"><path d="M50 15 Q53 28 61 38 L88 40 Q76 48 70 56 Q76 72 77 85 Q64 78 50 70 Q36 78 23 85 Q24 72 30 56 Q24 48 12 40 L39 38 Q47 28 50 15 Z" stroke="currentColor" stroke-width="4"/></svg><span>20</span></div>
    </div>
    <div class="titlebar">
      <svg width="18" height="18" viewBox="0 0 100 100" fill="none"><path d="M50 15 Q53 28 61 38 L88 40 Q76 48 70 56 Q76 72 77 85 Q64 78 50 70 Q36 78 23 85 Q24 72 30 56 Q24 48 12 40 L39 38 Q47 28 50 15 Z" stroke="currentColor" stroke-width="3"/></svg>
      <span>工程管家</span>
    </div>
  </div>

  <!-- 4: 线段五角星 -->
  <div class="item">
    <div class="label">一笔五角星</div>
    <div class="sub">连续一笔画出，笔触感</div>
    <div class="preview">
      <svg width="52" height="52" viewBox="0 0 100 100" fill="none">
        <path d="M50 15 L92 40 L33 58 L77 88 L12 40 Z" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="sizes">
      <div class="s"><svg width="36" height="36" viewBox="0 0 100 100" fill="none"><path d="M50 15 L92 40 L33 58 L77 88 L12 40 Z" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/></svg><span>36</span></div>
      <div class="s"><svg width="20" height="20" viewBox="0 0 100 100" fill="none"><path d="M50 15 L92 40 L33 58 L77 88 L12 40 Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/></svg><span>20</span></div>
    </div>
    <div class="titlebar">
      <svg width="18" height="18" viewBox="0 0 100 100" fill="none"><path d="M50 15 L92 40 L33 58 L77 88 L12 40 Z" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/></svg>
      <span>工程管家</span>
    </div>
  </div>

  <!-- 5: 五角星 + 中心点 -->
  <div class="item">
    <div class="label">星核</div>
    <div class="sub">标准星 + 中心实心圆</div>
    <div class="preview">
      <svg width="52" height="52" viewBox="0 0 100 100" fill="none">
        <polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
        <circle cx="50" cy="50" r="8" fill="currentColor"/>
      </svg>
    </div>
    <div class="sizes">
      <div class="s"><svg width="36" height="36" viewBox="0 0 100 100" fill="none"><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><circle cx="50" cy="50" r="8" fill="currentColor"/></svg><span>36</span></div>
      <div class="s"><svg width="20" height="20" viewBox="0 0 100 100" fill="none"><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><circle cx="50" cy="50" r="10" fill="currentColor"/></svg><span>20</span></div>
    </div>
    <div class="titlebar">
      <svg width="18" height="18" viewBox="0 0 100 100" fill="none"><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><circle cx="50" cy="50" r="8" fill="currentColor"/></svg>
      <span>工程管家</span>
    </div>
  </div>

  <!-- 6: 半填充五角星 -->
  <div class="item">
    <div class="label">半星</div>
    <div class="sub">左半填充，右半空心</div>
    <div class="preview">
      <svg width="52" height="52" viewBox="0 0 100 100" fill="none">
        <defs><clipPath id="left-half"><rect x="0" y="0" width="50" height="100"/></clipPath></defs>
        <polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
        <polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" fill="currentColor" clip-path="url(#left-half)" opacity="0.25"/>
      </svg>
    </div>
    <div class="sizes">
      <div class="s"><svg width="36" height="36" viewBox="0 0 100 100" fill="none"><defs><clipPath id="lh2"><rect x="0" y="0" width="50" height="100"/></clipPath></defs><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" fill="currentColor" clip-path="url(#lh2)" opacity="0.25"/></svg><span>36</span></div>
      <div class="s"><svg width="20" height="20" viewBox="0 0 100 100" fill="none"><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/></svg><span>20</span></div>
    </div>
    <div class="titlebar">
      <svg width="18" height="18" viewBox="0 0 100 100" fill="none"><defs><clipPath id="lh3"><rect x="0" y="0" width="50" height="100"/></clipPath></defs><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" fill="currentColor" clip-path="url(#lh3)" opacity="0.25"/></svg>
      <span>工程管家</span>
    </div>
  </div>

  <!-- 7: 双线五角星 -->
  <div class="item">
    <div class="label">双线星</div>
    <div class="sub">内外双层线条</div>
    <div class="preview">
      <svg width="52" height="52" viewBox="0 0 100 100" fill="none">
        <polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
        <polygon points="50,28 57,44 76,44 62,55 67,72 50,62 33,72 38,55 24,44 43,44" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" opacity="0.4"/>
      </svg>
    </div>
    <div class="sizes">
      <div class="s"><svg width="36" height="36" viewBox="0 0 100 100" fill="none"><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="50,28 57,44 76,44 62,55 67,72 50,62 33,72 38,55 24,44 43,44" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" opacity="0.4"/></svg><span>36</span></div>
      <div class="s"><svg width="20" height="20" viewBox="0 0 100 100" fill="none"><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/></svg><span>20</span></div>
    </div>
    <div class="titlebar">
      <svg width="18" height="18" viewBox="0 0 100 100" fill="none"><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/></svg>
      <span>工程管家</span>
    </div>
  </div>

  <!-- 8: 五角星顶点圆点 -->
  <div class="item">
    <div class="label">节点星</div>
    <div class="sub">五个顶点加圆点</div>
    <div class="preview">
      <svg width="52" height="52" viewBox="0 0 100 100" fill="none">
        <polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" opacity="0.35"/>
        <circle cx="50" cy="12" r="5" fill="currentColor"/>
        <circle cx="92" cy="40" r="5" fill="currentColor"/>
        <circle cx="77" cy="88" r="5" fill="currentColor"/>
        <circle cx="23" cy="88" r="5" fill="currentColor"/>
        <circle cx="8" cy="40" r="5" fill="currentColor"/>
      </svg>
    </div>
    <div class="sizes">
      <div class="s"><svg width="36" height="36" viewBox="0 0 100 100" fill="none"><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" opacity="0.35"/><circle cx="50" cy="12" r="5" fill="currentColor"/><circle cx="92" cy="40" r="5" fill="currentColor"/><circle cx="77" cy="88" r="5" fill="currentColor"/><circle cx="23" cy="88" r="5" fill="currentColor"/><circle cx="8" cy="40" r="5" fill="currentColor"/></svg><span>36</span></div>
      <div class="s"><svg width="20" height="20" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="12" r="7" fill="currentColor"/><circle cx="92" cy="40" r="7" fill="currentColor"/><circle cx="77" cy="88" r="7" fill="currentColor"/><circle cx="23" cy="88" r="7" fill="currentColor"/><circle cx="8" cy="40" r="7" fill="currentColor"/></svg><span>20</span></div>
    </div>
    <div class="titlebar">
      <svg width="18" height="18" viewBox="0 0 100 100" fill="none"><polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" opacity="0.35"/><circle cx="50" cy="12" r="5" fill="currentColor"/><circle cx="92" cy="40" r="5" fill="currentColor"/><circle cx="77" cy="88" r="5" fill="currentColor"/><circle cx="23" cy="88" r="5" fill="currentColor"/><circle cx="8" cy="40" r="5" fill="currentColor"/></svg>
      <span>工程管家</span>
    </div>
  </div>

</div>
</body>
</html>
