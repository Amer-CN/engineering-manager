<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Concept D: 齿轮 + 建筑 — 精密管理 -->
  <defs>
    <linearGradient id="grad-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8701A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- 外齿轮 -->
  <g transform="translate(100,100)">
    <!-- 齿轮齿 -->
    <rect x="-8" y="-48" width="16" height="12" rx="2" fill="url(#grad-d)"/>
    <rect x="-8" y="-48" width="16" height="12" rx="2" fill="url(#grad-d)" transform="rotate(45)"/>
    <rect x="-8" y="-48" width="16" height="12" rx="2" fill="url(#grad-d)" transform="rotate(90)"/>
    <rect x="-8" y="-48" width="16" height="12" rx="2" fill="url(#grad-d)" transform="rotate(135)"/>
    <rect x="-8" y="-48" width="16" height="12" rx="2" fill="url(#grad-d)" transform="rotate(180)"/>
    <rect x="-8" y="-48" width="16" height="12" rx="2" fill="url(#grad-d)" transform="rotate(225)"/>
    <rect x="-8" y="-48" width="16" height="12" rx="2" fill="url(#grad-d)" transform="rotate(270)"/>
    <rect x="-8" y="-48" width="16" height="12" rx="2" fill="url(#grad-d)" transform="rotate(315)"/>
    <!-- 齿轮主体 -->
    <circle cx="0" cy="0" r="36" fill="#1E293B"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#E8701A" stroke-width="2" opacity="0.5"/>
    <!-- 内部建筑图标 -->
    <polygon points="0,-18 -14,4 14,4" fill="#E8701A" opacity="0.9"/>
    <rect x="-10" y="4" width="20" height="14" rx="1" fill="#E8701A" opacity="0.7"/>
    <rect x="-3" y="10" width="6" height="8" rx="1" fill="#1E293B"/>
  </g>
</svg>
