<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Concept B: 工程图纸圆规 + 文档 -->
  <defs>
    <linearGradient id="grad-b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8701A"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <!-- 文档底座 -->
  <rect x="50" y="50" width="100" height="120" rx="6" fill="#1E293B" opacity="0.9"/>
  <rect x="56" y="56" width="88" height="108" rx="4" fill="#334155"/>
  <!-- 文档折角 -->
  <polygon points="132,50 150,68 132,68" fill="#475569"/>
  <!-- 圆规符号 -->
  <circle cx="90" cy="88" r="6" fill="none" stroke="#E8701A" stroke-width="2.5"/>
  <line x1="90" y1="94" x2="78" y2="132" stroke="#E8701A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90" y1="94" x2="102" y2="132" stroke="#E8701A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 小刻度线 -->
  <line x1="74" y1="132" x2="82" y2="132" stroke="#E8701A" stroke-width="2" stroke-linecap="round"/>
  <line x1="98" y1="132" x2="106" y2="132" stroke="#E8701A" stroke-width="2" stroke-linecap="round"/>
  <!-- 文字行（数据感） -->
  <rect x="64" y="144" width="30" height="3" rx="1.5" fill="#E8701A" opacity="0.4"/>
  <rect x="64" y="151" width="44" height="3" rx="1.5" fill="#E8701A" opacity="0.3"/>
</svg>
