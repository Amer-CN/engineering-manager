<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 方案 1 极简版：3 条线汇聚 + 中心点，¥ 意念但不画满 -->
  <g fill="none" stroke="currentColor" stroke-linecap="round">
    <!-- 左侧 3 条数据线汇聚到中心 -->
    <path d="M 18 25 Q 35 32, 50 50" stroke-width="3.5"/>
    <path d="M 18 50 Q 34 50, 50 50" stroke-width="3"/>
    <path d="M 18 75 Q 35 68, 50 50" stroke-width="3.5"/>
  </g>
  <!-- 中心节点 -->
  <circle cx="50" cy="50" r="6" fill="currentColor"/>
</svg>
