<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Concept E: AI 芯片 + 金额 — 科技金融 -->
  <defs>
    <linearGradient id="grad-e" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#E8701A"/>
    </linearGradient>
  </defs>
  <!-- 芯片主体 -->
  <rect x="60" y="60" width="80" height="80" rx="12" fill="#1E293B" stroke="#E8701A" stroke-width="2"/>
  <!-- 引脚 — 上 -->
  <rect x="75" y="44" width="4" height="16" rx="2" fill="#E8701A" opacity="0.7"/>
  <rect x="90" y="44" width="4" height="16" rx="2" fill="#E8701A" opacity="0.7"/>
  <rect x="105" y="44" width="4" height="16" rx="2" fill="#E8701A" opacity="0.7"/>
  <rect x="120" y="44" width="4" height="16" rx="2" fill="#E8701A" opacity="0.7"/>
  <!-- 引脚 — 下 -->
  <rect x="75" y="140" width="4" height="16" rx="2" fill="#E8701A" opacity="0.7"/>
  <rect x="90" y="140" width="4" height="16" rx="2" fill="#E8701A" opacity="0.7"/>
  <rect x="105" y="140" width="4" height="16" rx="2" fill="#E8701A" opacity="0.7"/>
  <rect x="120" y="140" width="4" height="16" rx="2" fill="#E8701A" opacity="0.7"/>
  <!-- 引脚 — 左 -->
  <rect x="44" y="75" width="16" height="4" rx="2" fill="#E8701A" opacity="0.7"/>
  <rect x="44" y="90" width="16" height="4" rx="2" fill="#E8701A" opacity="0.7"/>
  <rect x="44" y="105" width="16" height="4" rx="2" fill="#E8701A" opacity="0.7"/>
  <rect x="44" y="120" width="16" height="4" rx="2" fill="#E8701A" opacity="0.7"/>
  <!-- 引脚 — 右 -->
  <rect x="140" y="75" width="16" height="4" rx="2" fill="#E8701A" opacity="0.7"/>
  <rect x="140" y="90" width="16" height="4" rx="2" fill="#E8701A" opacity="0.7"/>
  <rect x="140" y="105" width="16" height="4" rx="2" fill="#E8701A" opacity="0.7"/>
  <rect x="140" y="120" width="16" height="4" rx="2" fill="#E8701A" opacity="0.7"/>
  <!-- ¥ 符号 -->
  <text x="100" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="url(#grad-e)">¥</text>
</svg>
